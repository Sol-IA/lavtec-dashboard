*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
.staticrypt-html,.staticrypt-body{height:100%;}
.staticrypt-body{background:linear-gradient(135deg,#060e1f 0%,#0f172a 55%,#0a1628 100%);font-family:'Segoe UI',system-ui,-apple-system,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;position:relative;overflow:hidden;}
.staticrypt-body::before{content:"";position:absolute;width:600px;height:600px;background:radial-gradient(circle,rgba(201,162,39,.07) 0%,transparent 65%);top:-150px;right:-150px;border-radius:50%;pointer-events:none;}
.staticrypt-body::after{content:"";position:absolute;width:400px;height:400px;background:radial-gradient(circle,rgba(14,165,233,.05) 0%,transparent 65%);bottom:-80px;left:-80px;border-radius:50%;pointer-events:none;}
.staticrypt-spinner-container{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#060e1f;z-index:999;}
.staticrypt-spinner{width:40px;height:40px;border:3px solid rgba(201,162,39,.15);border-top-color:#C9A227;border-radius:50%;animation:lv-spin 0.8s linear infinite;}
@keyframes lv-spin{to{transform:rotate(360deg);}}
.staticrypt-content{display:flex;align-items:center;justify-content:center;min-height:100vh;width:100%;padding:20px;}
.hidden{display:none!important;}
.lv-card{width:100%;max-width:430px;background:rgba(15,23,42,.9);backdrop-filter:blur(24px);border:1px solid rgba(201,162,39,.2);border-radius:22px;box-shadow:0 32px 80px rgba(0,0,0,.6);padding:0 0 32px;overflow:hidden;position:relative;z-index:1;}
.lv-topbar{height:4px;background:linear-gradient(90deg,transparent,#C9A227 30%,#f0d080 50%,#C9A227 70%,transparent);}
.lv-inner{padding:36px 36px 0;}
.lv-header{display:flex;align-items:center;justify-content:center;text-align:center;flex-direction:column;gap:8px;margin-bottom:32px;}
.lv-brand-tag{font-size:9px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:#C9A227;margin-bottom:5px;}
.lv-title{font-size:30px;font-weight:900;letter-spacing:4px;color:#f1f5f9;line-height:1;margin-bottom:5px;white-space:nowrap;text-shadow:0 2px 12px rgba(201,162,39,.2);}
.lv-subtitle{font-size:11px;color:#475569;letter-spacing:1.5px;text-transform:uppercase;white-space:nowrap;}
.lv-sep{height:1px;background:linear-gradient(90deg,transparent,rgba(201,162,39,.25),transparent);margin-bottom:28px;}
.lv-label{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#475569;margin-bottom:10px;display:block;}
.lv-input-wrap{display:flex;align-items:center;background:rgba(255,255,255,.03);border:1px solid #1e293b;border-radius:12px;padding:0 16px;margin-bottom:16px;transition:border-color .2s,box-shadow .2s;}
.lv-input-wrap:focus-within{border-color:rgba(201,162,39,.5);box-shadow:0 0 0 3px rgba(201,162,39,.08);}
#staticrypt-password{flex:1;background:transparent;border:none;outline:none;color:#e2e8f0;font-size:15px;padding:15px 0;font-family:inherit;letter-spacing:.5px;}
#staticrypt-password::placeholder{color:#334155;}
#staticrypt-decrypt-button{width:100%;padding:15px;border:none;border-radius:12px;cursor:pointer;background:linear-gradient(135deg,#b8911e 0%,#C9A227 40%,#f0d080 60%,#C9A227 100%);color:#0f172a;font-size:14px;font-weight:800;letter-spacing:1px;text-transform:uppercase;transition:all .25s;font-family:inherit;margin-top:4px;box-shadow:0 4px 20px rgba(201,162,39,.3);}
#staticrypt-decrypt-button:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(201,162,39,.4);}
.lv-footer{margin-top:28px;padding:20px 36px 0;border-top:1px solid rgba(255,255,255,.04);text-align:center;}
.lv-powered{font-size:10px;color:#334155;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px;}
.lv-powered strong{color:#475569;}
.lv-contact{font-size:11px;color:#475569;line-height:1.8;}
.lv-contact a{color:#C9A227;text-decoration:none;}
#staticrypt-remember-label{display:none!important;}
